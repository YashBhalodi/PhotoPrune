name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --extra dev --extra heic --python ${{ matrix.python }}

      - name: Run tests
        run: uv run --python ${{ matrix.python }} pytest -v
