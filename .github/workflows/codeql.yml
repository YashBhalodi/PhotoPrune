name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 05:00 UTC — catches any newly disclosed CVEs that affect
    # patterns in our codebase even if we haven't pushed in a while.
    - cron: "0 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
