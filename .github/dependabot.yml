version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"

  # Dependabot's pip ecosystem reads constraints in pyproject.toml. Our
  # constraints are deliberately loose (>=) so day-to-day bumps land via
  # `uv lock --upgrade`; Dependabot only fires here when an upper bound
  # needs raising or a CVE is filed.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
